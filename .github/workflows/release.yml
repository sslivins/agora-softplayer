name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q

      - name: Build .exe
        run: pyinstaller --noconfirm agora-softplayer.spec

      - name: Rename artifact
        shell: pwsh
        run: |
          Move-Item "dist\agora-softplayer.exe" "dist\agora-softplayer-${{ matrix.arch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-softplayer-${{ matrix.arch }}
          path: dist/agora-softplayer-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release + upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF##*/}"
          gh release create "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$tag" \
            --generate-notes \
            dist/agora-softplayer-amd64.exe \
            dist/agora-softplayer-arm64.exe
