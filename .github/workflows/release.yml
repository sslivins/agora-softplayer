name: Release

# Auto-releases on merge to main are PAUSED until the .exe signing
# situation is resolved (issue #9 -- Azure Trusted Signing). The
# unsigned .exe is blocked by Windows Defender Application Control on
# Microsoft-managed devices and triggers SmartScreen "unrecognized app"
# warnings everywhere else, so cutting a new release each merge just
# accumulates artifacts nobody can run cleanly.
#
# To resume auto-on-merge releases later: re-add `branches: [main]` to
# the trigger below and undo the `should_build=false` override in the
# `decide` job.
#
# To cut a release MANUALLY in the meantime (e.g. for testing the
# signing pipeline once it lands): push an annotated `v*` tag. The
# tag-push trigger below still runs the full build+release flow.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  decide:
    name: Decide whether to release
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.plan.outputs.should_build }}
      tag:          ${{ steps.plan.outputs.tag }}
      target_sha:   ${{ steps.plan.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Plan
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF##*/}"
            echo "Triggered by tag push: $tag"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag"          >> "$GITHUB_OUTPUT"
            # Empty target_sha means `gh release create` uses the tag's commit.
            echo "target_sha="       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-on-merge path is currently disabled; see the comment at
          # the top of this file. We keep the job structure intact so
          # re-enabling is a one-line change in the trigger.
          echo "Auto-on-merge release is disabled; nothing to do."
          echo "should_build=false" >> "$GITHUB_OUTPUT"
          echo "tag="                >> "$GITHUB_OUTPUT"
          echo "target_sha="         >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: decide
    if: needs.decide.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}

      - name: Install OpenSSL for arm64 (cryptography native build)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          # `cryptography` (a transitive dep) has no precompiled win_arm64
          # wheel, so pip falls back to a source build that pulls in the
          # `openssl-sys` Rust crate. That crate needs OpenSSL headers and
          # libs on disk. Install via vcpkg (preinstalled on the
          # windows-11-arm runner image) and point openssl-sys at it.
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            $env:VCPKG_INSTALLATION_ROOT = "C:\vcpkg"
            "VCPKG_INSTALLATION_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV
          }
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:arm64-windows
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install openssl:arm64-windows failed" }
          $installDir = "$env:VCPKG_INSTALLATION_ROOT\installed\arm64-windows"
          "OPENSSL_DIR=$installDir"              | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV
          "OPENSSL_LIB_DIR=$installDir\lib"      | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV
          "OPENSSL_INCLUDE_DIR=$installDir\include" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV
          "OPENSSL_NO_VENDOR=1"                  | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV
          Write-Output "OpenSSL installed to $installDir"
          Get-ChildItem "$installDir\lib" | Select-Object -First 10

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q

      - name: Build .exe
        run: pyinstaller --noconfirm agora-softplayer.spec

      - name: Rename artifact
        shell: pwsh
        run: |
          Move-Item "dist\agora-softplayer.exe" "dist\agora-softplayer-${{ matrix.arch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-softplayer-${{ matrix.arch }}
          path: dist/agora-softplayer-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [decide, build]
    if: needs.decide.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release + upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:        ${{ needs.decide.outputs.tag }}
          TARGET_SHA: ${{ needs.decide.outputs.target_sha }}
        run: |
          set -euo pipefail
          target_args=()
          if [ -n "${TARGET_SHA}" ]; then
            target_args=(--target "${TARGET_SHA}")
            echo "Creating release $TAG at commit $TARGET_SHA (this will also create the tag)"
          else
            echo "Creating release $TAG at existing tag"
          fi
          gh release create "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$TAG" \
            --generate-notes \
            "${target_args[@]}" \
            dist/agora-softplayer-amd64.exe \
            dist/agora-softplayer-arm64.exe
