name: Auto-tag

# Cut a release tag automatically whenever `main` advances to a
# pyproject.toml version that hasn't been tagged yet. The existing
# tag-triggered Release workflow then builds + publishes the artifacts.
#
# Workflow:
#   1. PR bumps pyproject.toml version (and src/agora_softplayer/__init__.py).
#   2. PR merges to main.
#   3. This job notices the new version, creates `v<X.Y.Z>` annotated
#      tag pointing at the merge commit, and pushes it.
#   4. .github/workflows/release.yml fires on the `v*` tag push.
#
# If the pyproject version on main matches an existing tag, this job
# is a clean no-op (every merge to main runs it; only version-bumping
# merges produce a new tag).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history + all tags
          fetch-tags: true

      - name: Read pyproject version
        id: ver
        run: |
          version=$(python3 -c "import tomllib,sys;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"   >> "$GITHUB_OUTPUT"
          echo "pyproject version on main: $version"

      - name: Check if tag already exists
        id: check
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "tag ${TAG} already exists -- nothing to do."
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag ${TAG} does not exist -- will create."
            echo "create=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Sanity-check __init__ version matches
        if: steps.check.outputs.create == 'true'
        env:
          PYPROJECT_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          init_version=$(python3 -c "import re;print(re.search(r'__version__\s*=\s*\"([^\"]+)\"',open('src/agora_softplayer/__init__.py').read()).group(1))")
          if [ "$init_version" != "$PYPROJECT_VERSION" ]; then
            echo "::error::pyproject.toml ($PYPROJECT_VERSION) and src/agora_softplayer/__init__.py ($init_version) disagree."
            echo "Both must be bumped in the same PR. Refusing to tag."
            exit 1
          fi

      - name: Create and push tag
        if: steps.check.outputs.create == 'true'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG (auto-tagged from main @ $GITHUB_SHA)"
          git push origin "$TAG"
          echo "Pushed tag $TAG -- Release workflow will fire next."
